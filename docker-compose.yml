version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: zappy-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-zappy}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-zappy_password}
    volumes:
      - mongodb-data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappy-network

  # Redis for queues and caching
  redis:
    image: redis:7-alpine
    container_name: zappy-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappy-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zappy-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_USER:-zappy}:${MONGO_PASSWORD:-zappy_password}@mongodb:27017/zappy?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - API_URL=http://backend-api:5000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend API Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-api
    restart: unless-stopped
    command: node dist/index.js
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_USER:-zappy}:${MONGO_PASSWORD:-zappy_password}@mongodb:27017/zappy?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5000
    ports:
      - "${BACKEND_API_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend Webhook Service
  backend-webhook:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-webhook
    restart: unless-stopped
    command: node dist/webhook-service.js
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=5001
      - MONGO_URI=mongodb://${MONGO_USER:-zappy}:${MONGO_PASSWORD:-zappy_password}@mongodb:27017/zappy?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
    ports:
      - "${WEBHOOK_PORT:-5001}:5001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend Worker Service
  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-worker
    restart: unless-stopped
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_USER:-zappy}:${MONGO_PASSWORD:-zappy_password}@mongodb:27017/zappy?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local

networks:
  zappy-network:
    driver: bridge
