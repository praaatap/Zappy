version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: zappy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend-api
      - backend-webhook
    networks:
      - zappy-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zappy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zappy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zappy_password}
      POSTGRES_DB: ${POSTGRES_DB:-zappy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zappy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappy-network

  # Redis for queues and caching
  redis:
    image: redis:7-alpine
    container_name: zappy-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappy-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zappy-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zappy}:${POSTGRES_PASSWORD:-zappy_password}@postgres:5432/${POSTGRES_DB:-zappy}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - API_URL=http://backend-api:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend API Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-api
    restart: unless-stopped
    command: node dist/index.js
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zappy}:${POSTGRES_PASSWORD:-zappy_password}@postgres:5432/${POSTGRES_DB:-zappy}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - ALLOWED_ORIGINS=http://your-domain.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend Webhook Service
  backend-webhook:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-webhook
    restart: unless-stopped
    command: node dist/webhook-service.js
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=5001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zappy}:${POSTGRES_PASSWORD:-zappy_password}@postgres:5432/${POSTGRES_DB:-zappy}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Backend Worker Service
  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zappy-backend-worker
    restart: unless-stopped
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zappy}:${POSTGRES_PASSWORD:-zappy_password}@postgres:5432/${POSTGRES_DB:-zappy}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappy-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: zappy-prometheus
    restart: unless-stopped
    volumes:
      - ./backend/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - zappy-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: zappy-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - zappy-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  zappy-network:
    driver: bridge
