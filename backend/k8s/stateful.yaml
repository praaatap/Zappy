# Simplified Stateful Deployments, in PROD use Helm charts for Redis/Mongo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zappy-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zappy-redis
  template:
    metadata:
      labels:
        app: zappy-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: zappy-redis
spec:
  selector:
    app: zappy-redis
  ports:
    - protocol: TCP
      port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zappy-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zappy-mongo
  template:
    metadata:
      labels:
        app: zappy-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: zappy-mongo
spec:
  selector:
    app: zappy-mongo
  ports:
    - protocol: TCP
      port: 27017